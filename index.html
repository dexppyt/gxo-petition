<script>
document.getElementById("petitionForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const employeeNumber = document.getElementById("employeeNumber").value;
  const email = document.getElementById("email").value;

  const formData = new URLSearchParams();

  formData.append("firstName", firstName);
  formData.append("lastName", lastName);
  formData.append("employeeNumber", employeeNumber);
  formData.append("email", email);

  try {
    await fetch("https://script.google.com/macros/s/AKfycbzgvbAn4PCswfwHdPKIEySIXLnWCveGXBxn7g036KpvGoR275UfYbDU95CVrXS92bpMSA/exec", {
      method: "POST",
      body: formData
    });

    document.getElementById("status").innerText =
      "Thank you for signing the petition.";

    document.getElementById("petitionForm").reset();

  } catch (err) {
    document.getElementById("status").innerText =
      "Error sending form.";
    console.error(err);
  }
});
</script>
